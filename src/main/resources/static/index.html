<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD KTP</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>

        *{
        box-sizing:border-box;
        }

        body{
        font-family:'Segoe UI',sans-serif;
        padding: 10px 2%;
        margin:0;
        height:100vh;
        overflow:hidden;
        background:#f4f6fb;
        color:#333;
        }
        /* CONTAINER */
        .container{
        height:100vh;
        display:flex;
        flex-direction:column;
        padding:15px 25px;
        }
        /* HEADER */
        .header-title{
        text-align:center;
        font-size:22px;
        font-weight:600;
        color:#3c3c8f;
        margin-bottom:10px;
        }
        /* MAIN WRAPPER */
        .main-wrapper{
        flex:1;
        display:flex;
        gap:12px;
        overflow:hidden;
        height: calc(100vh - 120px);
        }

        /* CARD */
        .form-card,
        .table-card{
        background:white;
        border-radius:10px;
        box-shadow:0 3px 8px rgba(0,0,0,0.08);
        padding:15px;
        display:flex;
        flex-direction:column;
        }

        /* FORM */
        .form-card{
        width:320px;
        flex-shrink:0;
        }

        .card-title{
        font-size:16px;
        font-weight:600;
        margin-bottom:10px;
        border-bottom:1px solid #eee;
        padding-bottom:8px;
        }

        .form-group{
        margin-bottom:8px;
        }

        .form-group label{
        font-size:12px;
        font-weight:600;
        margin-bottom:3px;
        display:block;
        }

        .form-control{
        width:100%;
        padding:6px 8px;
        font-size:13px;
        border:1px solid #ddd;
        border-radius:6px;
        }

        .form-control:focus{
        outline:none;
        border-color:#6c5ce7;
        }

        /* BUTTON */
        .btn-submit{
        margin-top:10px;
        padding:8px;
        background:#6c5ce7;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
        }

        .btn-submit:hover{
        background:#5748d6;
        }

        .btn-cancel{
        margin-top:6px;
        padding:8px;
        background:white;
        border:1px solid #ccc;
        border-radius:6px;
        cursor:pointer;
        }

        /* TABLE AREA */
        .table-card{
        flex:1;
        overflow:hidden;
        }

        /* TABLE SCROLL */
        .table-wrapper{
        flex:1;
        overflow-y:auto;
        }

        /* TABLE */
        table{
        width:100%;
        border-collapse:collapse;
        font-size:13px;
        }

        th{
        background:#4b3c8f;
        color:white;
        padding:10px;
        font-size:12px;
        }

        td{
        padding:10px;
        border-bottom:1px solid #eee;
        }

        tr:nth-child(even){
        background:#f7f7ff;
        }

        /* BUTTON ACTION */
        .btn-action{
        padding:5px 10px;
        font-size:12px;
        border:none;
        border-radius:5px;
        background:#38c172;
        color:white;
        cursor:pointer;
        margin-right:5px;
        }

        .btn-action:hover{
        background:#2da35f;
        }

        .btn-danger{
        background:#e3342f;
        }

        .btn-danger:hover{
        background:#c92b26;
        }

        /* NOTIFICATION */
        #notification{
        display:none;
        margin-bottom:8px;
        padding:8px;
        border-radius:6px;
        background:#eef0ff;
        font-size:13px;
        text-align:center;
        }

    </style>
</head>

<body>

<div class="container">

    <h2 class="header-title">Sistem Manajemen Data KTP</h2>

    <div id="notification"></div>

    <div class="main-wrapper">

        <!-- FORM -->
        <div class="form-card">

            <h3 class="card-title">Tambah Data KTP</h3>

            <form id="formKtp">

                <input type="hidden" id="idKtp">

                <div class="form-group">
                    <label>Nomor KTP</label>
                    <input type="text" class="form-control" id="nomorKtp" required>
                </div>

                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" class="form-control" id="namaLengkap" required>
                </div>

                <div class="form-group">
                    <label>Alamat</label>
                    <input type="text" class="form-control" id="alamat" required>
                </div>

                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <input type="date" class="form-control" id="tanggalLahir" required>
                </div>

                <div class="form-group">
                    <label>Jenis Kelamin</label>
                    <select class="form-control" id="jenisKelamin" required>
                        <option value="">Pilih...</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" id="btnSimpan">Simpan</button>

                <button type="button" class="btn-cancel" onclick="resetForm()" style="display:none;" id="btnBatal">Batal</button>

            </form>

        </div>

        <!-- TABLE -->
        <div class="table-card">

            <div class="table-wrapper">

                <table id="tabelData">

                    <thead>
                    <tr>
                        <th>NIK</th>
                        <th>Nama</th>
                        <th>Alamat</th>
                        <th>Tgl Lahir</th>
                        <th>L/P</th>
                        <th style="text-align:center;">Aksi</th>
                    </tr>
                    </thead>

                    <tbody id="tabelKtpBody">
                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>
    const apiUrl = "http://localhost:8080/ktp";
    $(document).ready(function() {
    loadData();
    $("#formKtp").on("submit", function(e) {
    e.preventDefault();
    const id = $("#idKtp").val();
    const payload = {
    nomorKtp: $("#nomorKtp").val(),
    namaLengkap: $("#namaLengkap").val(),
    alamat: $("#alamat").val(),
    tanggalLahir: $("#tanggalLahir").val(),
    jenisKelamin: $("#jenisKelamin").val()
    };
    const typeMethod = id ? "PUT" : "POST";
    const targetUrl = id ? apiUrl + "/" + id : apiUrl;
    $.ajax({
    url: targetUrl,
    type: typeMethod,
    contentType: "application/json",
    data: JSON.stringify(payload),
    success: function(response){
    showNotification(response.message);
    resetForm();
    loadData();
    },
    error: function(xhr){
    const errorMsg = xhr.responseJSON ? xhr.responseJSON.message : "Terjadi kesalahan";
    showNotification("Error: " + errorMsg);
    }
    });
    });
    });
    function loadData(){
    $.ajax({
    url: apiUrl,
    type:"GET",
    success:function(response){
    let rows="";
    if(response.data.length===0){
    rows="<tr><td colspan='6' style='text-align:center; padding:30px;'>Belum ada data KTP</td></tr>";
    }else{
    response.data.forEach(function(ktp){
    rows += "<tr>" +
    "<td>"+ktp.nomorKtp+"</td>"+
    "<td>"+ktp.namaLengkap+"</td>"+
    "<td>"+ktp.alamat+"</td>"+
    "<td>"+ktp.tanggalLahir+"</td>"+
    "<td>"+ktp.jenisKelamin+"</td>"+
    "<td style='text-align:center; white-space:nowrap;'>" +
    "<button class='btn-action' onclick='editData("+ktp.id+")'>Edit</button>" +
    "<button class='btn-action btn-danger' onclick='deleteData("+ktp.id+")'>Hapus</button>" +
    "</td>"+
    "</tr>";

    });

    }

    $("#tabelKtpBody").html(rows);

    },
    error:function(){
    showNotification("Gagal memuat data dari server.");}
    });
    }
    function editData(id){
    $.ajax({
    url: apiUrl + "/" + id,
    type:"GET",
    success:function(response){
    const ktp=response.data;
    $("#idKtp").val(ktp.id);
    $("#nomorKtp").val(ktp.nomorKtp).prop("disabled",true);
    $("#namaLengkap").val(ktp.namaLengkap);
    $("#alamat").val(ktp.alamat);
    $("#tanggalLahir").val(ktp.tanggalLahir);
    $("#jenisKelamin").val(ktp.jenisKelamin);

    $(".card-title").text("Edit Data KTP");
    $("#btnSimpan").text("Update");
    $("#btnBatal").show();
    window.scrollTo({ top:0, behavior:'smooth' });
    }
    });
    }
    function deleteData(id){
    if(confirm("Apakah Anda yakin ingin menghapus data KTP ini?")){
    $.ajax({
    url: apiUrl + "/" + id,
    type:"DELETE",
    success:function(response){
    showNotification(response.message);
    loadData();
    },
    error:function(){
    showNotification("Gagal menghapus data.");}
    });
    }
    }
    function resetForm(){
    $("#formKtp")[0].reset();
    $("#idKtp").val("");
    $("#nomorKtp").prop("disabled",false);
    $(".card-title").text("Tambah Data KTP");
    $("#btnSimpan").text("Simpan");
    $("#btnBatal").hide();}
    function showNotification(message){
    const notif=$("#notification");
    notif.text(message)
    .fadeIn()
    .delay(3000)
    .fadeOut();}
</script>
</body>
</html>
